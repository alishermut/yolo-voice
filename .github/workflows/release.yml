name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Windows build ──────────────────────────────────────────────────
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache Python sidecar environment
        uses: actions/cache@v4
        with:
          path: |
            sidecar/python-env
            sidecar/models
          key: sidecar-${{ hashFiles('sidecar/requirements.txt') }}

      - name: Prepare Python sidecar environment
        shell: pwsh
        run: |
          if (!(Test-Path "sidecar/python-env/python.exe")) {
            .\scripts\prepare-sidecar.ps1
          } else {
            Write-Host "Python sidecar environment already cached, skipping."
          }

      - name: Build Tauri app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Verify bundled updater resources
        shell: pwsh
        run: |
          $candidates = @(
            "src-tauri/target/release/resources/distil_whisper.py",
            "src-tauri/target/release/resources/resources/distil_whisper.py",
            "src-tauri/target/release/_up_/sidecar/distil_whisper.py"
          )
          $found = $candidates | Where-Object { Test-Path $_ }
          if (!$found) {
            Write-Host "::error::distil_whisper.py was not found in any bundled release artifact location."
            exit 1
          }
          Write-Host "Verified distil_whisper.py in:"
          $found | ForEach-Object { Write-Host "  $_" }

      - name: Publish GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $bundleDir = Resolve-Path "src-tauri/target/release/bundle/nsis"
          $tag = "v$version"
          $repo = "${{ github.repository }}"
          $releaseNotesPath = "docs/releases/v$version.md"
          $releaseTitle = "YOLO Voice v$version"

          Write-Host "Bundle directory: $bundleDir"
          Write-Host "Bundle directory contents:"
          Get-ChildItem -Path $bundleDir -Recurse | Select-Object FullName | Format-Table -HideTableHeaders

          $installer = Get-ChildItem -Path $bundleDir -Filter *setup.exe -File -Recurse | Where-Object { $_.Name -notmatch '\.sig$' } | Select-Object -First 1
          $installerSig = Get-ChildItem -Path $bundleDir -Filter *setup.exe.sig -File -Recurse | Select-Object -First 1

          $nsisZip = Get-ChildItem -Path $bundleDir -Filter *.nsis.zip -File -Recurse | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path $bundleDir -Filter *.nsis.zip.sig -File -Recurse | Select-Object -First 1

          if (!$installer) {
            Write-Host "::error::Missing installer exe."
            exit 1
          }

          if ($nsisZip -and $nsisSig) {
            $updaterFile = $nsisZip
            $sigFile = $nsisSig
          } elseif ($installerSig) {
            $updaterFile = $installer
            $sigFile = $installerSig
          } else {
            Write-Host "::error::Missing signature file for updater."
            exit 1
          }

          $signature = Get-Content $sigFile.FullName -Raw

          if (Test-Path $releaseNotesPath) {
            $heading = Get-Content $releaseNotesPath | Where-Object { $_ -match '^#\s+' } | Select-Object -First 1
            if ($heading) {
              $releaseTitle = $heading -replace '^#\s+', ''
            }
          }

          if (!(Test-Path $releaseNotesPath)) {
            Set-Content -Path "release-notes.md" -Value "YOLO Voice v$version"
            $releaseNotesPath = "release-notes.md"
          }

          $assets = @($installer.FullName)
          if ($installerSig) { $assets += $installerSig.FullName }
          if ($nsisZip) { $assets += $nsisZip.FullName }
          if ($nsisSig) { $assets += $nsisSig.FullName }

          gh release create $tag @assets --title "$releaseTitle" --notes-file "$releaseNotesPath"

          $release = gh api "repos/$repo/releases/tags/$tag" | ConvertFrom-Json
          $updaterDigest = "sha256:$((Get-FileHash $updaterFile.FullName -Algorithm SHA256).Hash.ToLower())"
          $publishedUpdater = $release.assets | Where-Object { $_.digest -eq $updaterDigest } | Select-Object -First 1
          if (!$publishedUpdater) {
            Write-Host "::error::Could not find published updater asset matching digest $updaterDigest."
            exit 1
          }

          $json = @{
            version = $version
            notes = $releaseTitle
            pub_date = $release.published_at
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $publishedUpdater.browser_download_url
              }
            }
          } | ConvertTo-Json -Depth 4

          $json | Out-File -FilePath "latest.json" -Encoding utf8
          gh release upload $tag "latest.json#latest.json" --clobber
          Write-Host "Generated latest.json:"
          Write-Host $json
          Write-Host "Release title: $releaseTitle"

          $latest = Get-Content "latest.json" -Raw | ConvertFrom-Json
          try {
            $null = Invoke-WebRequest -Uri $latest.platforms.'windows-x86_64'.url -Method Head -MaximumRedirection 5
          } catch {
            Write-Host "::error::Published updater asset URL is not reachable: $($latest.platforms.'windows-x86_64'.url)"
            throw
          }

          Write-Host "Published release $tag with artifacts: $($assets -join ', ')"

  # ── macOS build (Apple Silicon) ────────────────────────────────────
  # To enable code signing and notarization, add these GitHub Secrets:
  #   APPLE_CERTIFICATE          - Base64-encoded .p12 Developer ID certificate
  #   APPLE_CERTIFICATE_PASSWORD - Password for the .p12 certificate
  #   APPLE_SIGNING_IDENTITY     - e.g. "Developer ID Application: Your Name (TEAMID)"
  #   APPLE_ID                   - Apple ID email for notarization
  #   APPLE_PASSWORD             - App-specific password for notarization
  #   APPLE_TEAM_ID              - Apple Developer Team ID
  release-macos:
    # Temporarily disabled until the macOS release pipeline is ready again.
    if: ${{ false }}
    needs: release-windows
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Optional: Import Apple signing certificate when secrets are configured
      - name: Import Apple signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Build Tauri app for macOS
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing (used by Tauri if available)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target aarch64-apple-darwin --config src-tauri/tauri.macos.conf.json

      - name: Upload macOS artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          TAG="v${VERSION}"
          REPO="${{ github.repository }}"

          # Find the .dmg file
          DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' -type f | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No .dmg file found"
            exit 1
          fi
          echo "Found DMG: $DMG"
          DMG_NAME=$(basename "$DMG")

          # Check for Tauri updater signature (.sig file next to DMG)
          DMG_SIG="${DMG}.sig"
          MACOS_SIGNATURE=""
          if [ -f "$DMG_SIG" ]; then
            MACOS_SIGNATURE=$(cat "$DMG_SIG")
            echo "Found macOS updater signature"
          fi

          # Upload DMG to release (Windows job is guaranteed to have created it via needs:)
          gh release upload "$TAG" "$DMG" --clobber
          echo "Uploaded $DMG_NAME to release $TAG"

          # Update latest.json to include macOS platform
          if [ -n "$MACOS_SIGNATURE" ]; then
            gh release download "$TAG" --pattern "latest.json" --dir /tmp --clobber || true
            if [ -f /tmp/latest.json ]; then
              RELEASE_JSON=$(gh api "repos/${REPO}/releases/tags/${TAG}")
              DMG_DIGEST="sha256:$(shasum -a 256 "$DMG" | awk '{print tolower($1)}')"
              MACOS_URL=$(echo "$RELEASE_JSON" | jq -r --arg digest "$DMG_DIGEST" '.assets[] | select(.digest == $digest) | .browser_download_url' | head -n 1)
              if [ -z "$MACOS_URL" ] || [ "$MACOS_URL" = "null" ]; then
                echo "::error::Could not find uploaded DMG asset matching digest $DMG_DIGEST"
                exit 1
              fi
              # Add darwin-aarch64 entry to the platforms object
              jq --arg sig "$MACOS_SIGNATURE" --arg url "$MACOS_URL" \
                '.platforms["darwin-aarch64"] = {"signature": $sig, "url": $url}' \
                /tmp/latest.json > /tmp/latest-updated.json
              gh release upload "$TAG" "/tmp/latest-updated.json#latest.json" --clobber
              echo "Updated latest.json with darwin-aarch64 platform"
            fi
          fi
