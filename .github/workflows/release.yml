name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache Python sidecar environment
        uses: actions/cache@v4
        with:
          path: |
            sidecar/python-env
            sidecar/models
          key: sidecar-${{ hashFiles('sidecar/requirements.txt') }}

      - name: Prepare Python sidecar environment
        shell: pwsh
        run: |
          if (!(Test-Path "sidecar/python-env/python.exe")) {
            .\scripts\prepare-sidecar.ps1
          } else {
            Write-Host "Python sidecar environment already cached, skipping."
          }

      - name: Build and release Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'YOLO Voice v__VERSION__'
          releaseBody: |
            Patch release focused on production packaging reliability.

            Highlights:
            - fix offline transcription in installed builds by resolving bundled sidecar resources from the packaged `sidecar` directory
            - fix bundled industry pack lookup in installed builds
            - harden updater asset publishing so `latest.json`, `.nsis.zip`, and `.nsis.zip.sig` are always uploaded
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      # tauri-action often fails to upload latest.json ("Signature not found").
      # This step manually builds and uploads it from the build artifacts.
      - name: Generate and upload updater JSON
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $bundleDir = Resolve-Path "src-tauri/target/release/bundle/nsis"

          Write-Host "Bundle directory: $bundleDir"
          Write-Host "Bundle directory contents:"
          Get-ChildItem -Path $bundleDir -Recurse | Select-Object FullName | Format-Table -HideTableHeaders

          # Find the .nsis.zip and its .sig
          $nsisZip = Get-ChildItem -Path $bundleDir -Filter *.nsis.zip -File -Recurse | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path $bundleDir -Filter *.nsis.zip.sig -File -Recurse | Select-Object -First 1

          if (!$nsisZip -or !$nsisSig) {
            Write-Host "::warning::Could not find NSIS zip or signature files. Updater JSON not uploaded."
            exit 0
          }

          $signature = Get-Content $nsisSig.FullName -Raw
          $tag = "v$version"
          $repo = "${{ github.repository }}"
          $zipName = $nsisZip.Name
          $url = "https://github.com/$repo/releases/download/$tag/$zipName"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          # Build latest.json
          $json = @{
            version = $version
            notes = "YOLO Voice v$version"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $url
              }
            }
          } | ConvertTo-Json -Depth 4

          $json | Out-File -FilePath "latest.json" -Encoding utf8
          Write-Host "Generated latest.json:"
          Write-Host $json

          # Upload the .nsis.zip (updater download) and .nsis.zip.sig to the release
          gh release upload $tag "$($nsisZip.FullName)" --clobber
          gh release upload $tag "$($nsisSig.FullName)" --clobber

          # Upload latest.json to the release
          gh release upload $tag latest.json --clobber

          Write-Host "Uploaded latest.json, $zipName, and signature to release $tag"
