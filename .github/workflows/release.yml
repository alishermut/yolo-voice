name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache Python sidecar environment
        uses: actions/cache@v4
        with:
          path: |
            sidecar/python-env
            sidecar/models
          key: sidecar-${{ hashFiles('sidecar/requirements.txt') }}

      - name: Prepare Python sidecar environment
        shell: pwsh
        run: |
          if (!(Test-Path "sidecar/python-env/python.exe")) {
            .\scripts\prepare-sidecar.ps1
          } else {
            Write-Host "Python sidecar environment already cached, skipping."
          }

      - name: Build Tauri app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Publish GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $bundleDir = Resolve-Path "src-tauri/target/release/bundle/nsis"
          $tag = "v$version"
          $repo = "${{ github.repository }}"
          $releaseNotesPath = "docs/releases/v$version.md"

          Write-Host "Bundle directory: $bundleDir"
          Write-Host "Bundle directory contents:"
          Get-ChildItem -Path $bundleDir -Recurse | Select-Object FullName | Format-Table -HideTableHeaders

          $installer = Get-ChildItem -Path $bundleDir -Filter *setup.exe -File -Recurse | Select-Object -First 1
          $nsisZip = Get-ChildItem -Path $bundleDir -Filter *.nsis.zip -File -Recurse | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path $bundleDir -Filter *.nsis.zip.sig -File -Recurse | Select-Object -First 1

          if (!$installer -or !$nsisZip -or !$nsisSig) {
            Write-Host "::error::Missing expected release artifacts."
            exit 1
          }

          $signature = Get-Content $nsisSig.FullName -Raw
          $zipName = $nsisZip.Name
          $url = "https://github.com/$repo/releases/download/$tag/$zipName"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          # Build latest.json
          $json = @{
            version = $version
            notes = "YOLO Voice v$version"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $url
              }
            }
          } | ConvertTo-Json -Depth 4

          $json | Out-File -FilePath "latest.json" -Encoding utf8
          Write-Host "Generated latest.json:"
          Write-Host $json

          if (!(Test-Path $releaseNotesPath)) {
            Set-Content -Path "release-notes.md" -Value "YOLO Voice v$version"
            $releaseNotesPath = "release-notes.md"
          }

          gh release create $tag "$($installer.FullName)" "$($nsisZip.FullName)" "$($nsisSig.FullName)" latest.json --title "YOLO Voice v$version" --notes-file "$releaseNotesPath"

          Write-Host "Published release $tag with installer, updater zip, signature, and latest.json"
