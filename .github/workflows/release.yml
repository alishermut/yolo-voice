name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Windows build ──────────────────────────────────────────────────
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache Python sidecar environment
        uses: actions/cache@v4
        with:
          path: |
            sidecar/python-env
            sidecar/models
          key: sidecar-${{ hashFiles('sidecar/requirements.txt') }}

      - name: Prepare Python sidecar environment
        shell: pwsh
        run: |
          if (!(Test-Path "sidecar/python-env/python.exe")) {
            .\scripts\prepare-sidecar.ps1
          } else {
            Write-Host "Python sidecar environment already cached, skipping."
          }

      - name: Build Tauri app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Publish GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $bundleDir = Resolve-Path "src-tauri/target/release/bundle/nsis"
          $tag = "v$version"
          $repo = "${{ github.repository }}"
          $releaseNotesPath = "docs/releases/v$version.md"

          Write-Host "Bundle directory: $bundleDir"
          Write-Host "Bundle directory contents:"
          Get-ChildItem -Path $bundleDir -Recurse | Select-Object FullName | Format-Table -HideTableHeaders

          $installer = Get-ChildItem -Path $bundleDir -Filter *setup.exe -File -Recurse | Where-Object { $_.Name -notmatch '\.sig$' } | Select-Object -First 1
          $installerSig = Get-ChildItem -Path $bundleDir -Filter *setup.exe.sig -File -Recurse | Select-Object -First 1

          $nsisZip = Get-ChildItem -Path $bundleDir -Filter *.nsis.zip -File -Recurse | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path $bundleDir -Filter *.nsis.zip.sig -File -Recurse | Select-Object -First 1

          if (!$installer) {
            Write-Host "::error::Missing installer exe."
            exit 1
          }

          if ($nsisZip -and $nsisSig) {
            $updaterFile = $nsisZip
            $sigFile = $nsisSig
          } elseif ($installerSig) {
            $updaterFile = $installer
            $sigFile = $installerSig
          } else {
            Write-Host "::error::Missing signature file for updater."
            exit 1
          }

          $signature = Get-Content $sigFile.FullName -Raw
          $updaterName = $updaterFile.Name
          $url = "https://github.com/$repo/releases/download/$tag/$updaterName"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $json = @{
            version = $version
            notes = "YOLO Voice v$version"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $url
              }
            }
          } | ConvertTo-Json -Depth 4

          $json | Out-File -FilePath "latest.json" -Encoding utf8
          Write-Host "Generated latest.json:"
          Write-Host $json

          if (!(Test-Path $releaseNotesPath)) {
            Set-Content -Path "release-notes.md" -Value "YOLO Voice v$version"
            $releaseNotesPath = "release-notes.md"
          }

          $assets = @($installer.FullName, "latest.json")
          if ($installerSig) { $assets += $installerSig.FullName }
          if ($nsisZip) { $assets += $nsisZip.FullName }
          if ($nsisSig) { $assets += $nsisSig.FullName }

          gh release create $tag @assets --title "YOLO Voice v$version" --notes-file "$releaseNotesPath"

          Write-Host "Published release $tag with artifacts: $($assets -join ', ')"

  # ── macOS build (Apple Silicon) ────────────────────────────────────
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app for macOS
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload macOS artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          TAG="v${VERSION}"

          # Find the .dmg file
          DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' -type f | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No .dmg file found"
            exit 1
          fi

          echo "Found DMG: $DMG"

          # Wait for the Windows job to create the release (it may not exist yet)
          for i in $(seq 1 30); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG exists, uploading macOS artifact..."
              gh release upload "$TAG" "$DMG" --clobber
              echo "Uploaded $(basename "$DMG") to release $TAG"
              exit 0
            fi
            echo "Release $TAG not found yet, waiting 30s... (attempt $i/30)"
            sleep 30
          done

          # If release still doesn't exist, create it ourselves
          echo "Creating release $TAG with macOS artifact..."
          NOTES_FILE="docs/releases/v${VERSION}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "YOLO Voice v${VERSION}" > release-notes.md
            NOTES_FILE="release-notes.md"
          fi
          gh release create "$TAG" "$DMG" --title "YOLO Voice v${VERSION}" --notes-file "$NOTES_FILE"
